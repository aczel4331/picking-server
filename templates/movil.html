<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1E293B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<title>Logibot · Picking</title>
<style>
:root{--bg:#111318;--panel:#1C2030;--card:#161B27;--border:#2A3352;
  --accent:#2563EB;--accent2:#1D4ED8;--success:#0EA5E9;
  --warning:#F59E0B;--danger:#EF4444;--hi:#F1F5F9;--mid:#94A3B8;--lo:#475569;--bar:#1E3A5F}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--hi);font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--panel);padding:10px 14px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.t-left{display:flex;align-items:center;gap:8px}
.t-icon{font-size:20px}
.t-title{font-size:15px;font-weight:800}
.t-sub{font-size:10px;color:var(--mid)}
.badge{background:var(--accent);color:#fff;font-size:13px;font-weight:800;
  padding:5px 12px;border-radius:20px}
.badge.done{background:var(--success)}
.badge.warn{background:var(--warning);color:#000}
#ban{display:none;background:var(--success);color:#fff;text-align:center;
  padding:14px;font-size:16px;font-weight:800;letter-spacing:.04em;flex-shrink:0}
#ban.show{display:block}
.scan-box{padding:10px 12px;background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0}
#sku{width:100%;background:var(--card);border:2px solid var(--accent);color:var(--hi);
  font-size:20px;font-family:monospace;font-weight:700;padding:12px 14px;
  border-radius:10px;outline:none;text-align:center;text-transform:uppercase;
  caret-color:var(--accent)}
#sku:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.25)}
#fb{margin-top:8px;min-height:48px;border-radius:10px;padding:10px 14px;
  font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px;
  transition:background .15s}
#fb.ok{background:rgba(16,185,129,.18);color:var(--success)}
#fb.warn{background:rgba(245,158,11,.18);color:var(--warning)}
#fb.err{background:rgba(239,68,68,.18);color:var(--danger)}
#fb.neu{color:var(--mid)}
.content{flex:1;overflow-y:auto;padding:8px 8px 80px}
.grupo{margin-bottom:10px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.g-hdr{background:var(--bar);padding:10px 14px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;user-select:none}
.g-left{display:flex;align-items:center;gap:8px}
.g-name{font-size:13px;font-weight:800;color:var(--accent);text-transform:uppercase}
.g-stats{font-size:10px;color:var(--mid)}
.g-prog{font-size:14px;font-weight:800}
.g-prog.done{color:var(--success)}
.g-prog.pend{color:var(--accent)}
.g-items{background:var(--card)}
.g-items.col{display:none}
.item{display:flex;align-items:center;gap:10px;padding:12px 14px;
  border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
.item.done{opacity:.45}
.item.recien{animation:flash_ok .6s ease}
@keyframes flash_ok{0%,100%{background:transparent}50%{background:rgba(16,185,129,.25)}}
.chk{font-size:22px;flex-shrink:0;width:28px;text-align:center}
.chk.ok{color:var(--success)}
.chk.pend{color:var(--lo)}
.ithumb{flex-shrink:0;width:46px;height:46px;border-radius:8px;
  background:var(--border);background-size:cover;background-position:center;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  color:var(--lo);cursor:pointer;border:1px solid var(--border)}
.ithumb.has-img{border-color:var(--accent)}
.ibody{flex:1;min-width:0}
.iname{font-size:14px;font-weight:600;color:var(--hi);white-space:normal;line-height:1.3;margin-top:3px}
.isku-badge{display:inline-block;font-family:monospace;font-size:11px;font-weight:700;color:var(--accent);background:rgba(37,99,235,.14);padding:2px 7px;border-radius:6px;margin-bottom:2px}
.irow{display:flex;align-items:center;gap:10px;margin-top:3px}
.isku{font-family:monospace;font-size:12px;color:var(--mid)}
.icnt{font-size:14px;font-weight:800}
.icnt.ok{color:var(--success)}
.icnt.pend{color:var(--accent)}
.iest{font-size:11px;color:var(--accent2);margin-top:2px}
#flash{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .12s;z-index:200}
#flash.ok{background:rgba(16,185,129,.25)}
#flash.err{background:rgba(239,68,68,.25)}
#cam-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;
  display:none;flex-direction:column;align-items:center;justify-content:center}
#cam-overlay.open{display:flex}
#cam-wrap{position:relative;width:min(92vw,400px);border-radius:16px;overflow:hidden;
  background:#000;border:2px solid var(--accent)}
#cam-video{width:100%;display:block;max-height:65vh;object-fit:cover}
#cam-guide{position:absolute;inset:0;pointer-events:none;display:flex;
  align-items:center;justify-content:center}
#cam-guide svg{width:72%;max-width:260px;opacity:.75}
#cam-hint{margin-top:14px;font-size:13px;color:rgba(255,255,255,.7);text-align:center}
#cam-result{margin-top:10px;font-size:15px;font-weight:700;color:var(--success);
  min-height:22px;text-align:center}
#btn-close-cam{margin-top:16px;padding:10px 32px;border-radius:30px;border:none;
  background:var(--danger);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
#btn-cam{position:fixed;bottom:88px;right:16px;background:#7C3AED;color:#fff;border:none;
  border-radius:50%;width:52px;height:52px;font-size:22px;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,.5);display:flex;align-items:center;
  justify-content:center;z-index:50;transition:transform .15s}
#btn-cam:active{transform:scale(.9)}
#cam-torch{margin-top:10px;padding:8px 20px;border-radius:20px;border:1px solid rgba(255,255,255,.3);
  background:transparent;color:#fff;font-size:13px;cursor:pointer;display:none}
.fab{position:fixed;bottom:20px;right:16px;background:var(--accent);color:#fff;border:none;
  border-radius:50%;width:56px;height:56px;font-size:24px;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,.5);display:flex;align-items:center;
  justify-content:center;z-index:50;transition:transform .15s}
.fab:active{transform:scale(.9)}
.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--panel);border:1px solid var(--border);color:var(--hi);
  padding:12px 24px;border-radius:30px;font-size:14px;font-weight:700;z-index:999;
  transition:transform .25s,opacity .25s;opacity:0;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.4)}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.ok{border-color:var(--success);color:var(--success)}
#toast.err{border-color:var(--danger);color:var(--danger)}
.empty{text-align:center;padding:60px 20px;color:var(--lo)}
.empty-i{font-size:52px;margin-bottom:12px}
.empty-t{font-size:15px;line-height:1.5}
.lightbox{display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.92);align-items:center;justify-content:center;
  flex-direction:column;padding:20px}
.lightbox img{max-width:92vw;max-height:78vh;border-radius:12px;
  object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.lb-name{color:#fff;font-family:monospace;font-size:15px;font-weight:700;margin-top:14px}
.lb-close{color:#9CA3AF;font-size:13px;margin-top:6px}
</style>
</head>
<body>
<div id="flash"></div>

<div class="topbar">
  <div class="t-left">
    <span class="t-icon">&#x2B21;</span>
    <div>
      <div class="t-title">PICKING · FASE 1</div>
      <div class="t-sub" id="t-sub">Colecta en dep&#xF3;sito</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button id="btn-voz" onclick="toggleVoz()"
            style="background:var(--panel);border:1px solid var(--border);color:var(--accent);
            border-radius:8px;padding:6px 10px;font-size:16px;cursor:pointer;flex-shrink:0"
            title="Activar/desactivar voz">&#x1F50A;</button>
    <div id="badge" class="badge">&#x2014; / &#x2014;</div>
  </div>
</div>

<div id="canal-selector" style="display:flex;gap:0;background:var(--bg);
     padding:8px 12px;border-bottom:2px solid var(--border)">
  <button class="canal-btn" id="btn-canal-flex"
          onclick="setCanal('flex')"
          style="flex:1;padding:10px 6px;border:2px solid #7C3AED;background:#7C3AED;
          color:#fff;font-weight:800;font-size:15px;border-radius:10px 0 0 10px;
          cursor:pointer;min-height:52px;line-height:1.2">&#x26A1; FLEX</button>
  <button class="canal-btn" id="btn-canal-colecta"
          onclick="setCanal('colecta')"
          style="flex:1;padding:10px 6px;border:2px solid #2563EB;background:var(--card);
          color:#2563EB;font-weight:800;font-size:15px;border-radius:0 10px 10px 0;
          cursor:pointer;min-height:52px;line-height:1.2">&#x1F69A; COLECTA</button>
</div>

<div id="ban">&#x1F389; &#xA1;COLECTA COMPLETA! Avis&#xE1; al supervisor.</div>

<div id="guia" style="display:none;background:linear-gradient(135deg,#1E3A8A,#152C66);
     color:#fff;padding:14px 16px;border-bottom:3px solid #06B6D4">
  <div style="font-size:11px;font-weight:700;letter-spacing:.08em;color:#93C5FD;margin-bottom:4px">
    &#x1F449; PR&#xD3;XIMO A BUSCAR</div>
  <div id="guia-pasillo" style="font-size:20px;font-weight:900;line-height:1.1">&#x2014;</div>
  <div id="guia-nombre" style="font-size:15px;font-weight:600;margin-top:4px;line-height:1.25">&#x2014;</div>
  <div style="display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap">
    <span id="guia-sku" style="font-family:monospace;font-size:13px;background:rgba(255,255,255,.18);
          padding:2px 8px;border-radius:6px"></span>
    <span id="guia-estante" style="font-size:12px;color:#BFDBFE"></span>
    <span id="guia-cant" style="font-size:13px;font-weight:700;color:#FCD34D"></span>
    <button onclick="repetirVoz()" style="margin-left:auto;background:rgba(255,255,255,.2);
            border:none;color:#fff;border-radius:8px;padding:5px 12px;font-size:16px;cursor:pointer"
            title="Repetir por voz">&#x1F50A;</button>
  </div>
</div>

<div class="scan-box">
  <div style="display:flex;gap:8px;margin-bottom:8px">
    <input id="sku" type="text" inputmode="decimal"
           autocomplete="off" autocorrect="off" autocapitalize="off"
           spellcheck="false" enterkeyhint="send"
           placeholder="Apunt&#xE1; el esc&#xE1;ner aqu&#xED;"
           style="flex:1;font-size:18px">
    <button id="btn-confirmar"
            style="background:var(--success);color:#fff;border:none;border-radius:10px;
            padding:0 18px;font-size:20px;font-weight:800;cursor:pointer;flex-shrink:0"
            onclick="confirmarManual()">&#x2713;</button>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="fb" class="neu" style="flex:1">&#x1F52B; Listo para escanear</div>
    <button id="btn-teclado" onclick="toggleTeclado()"
            style="background:var(--panel);border:1px solid var(--border);color:var(--mid);
            border-radius:8px;padding:5px 10px;font-size:16px;cursor:pointer;flex-shrink:0"
            title="Abrir teclado manual">&#x2328;</button>
  </div>
  <div id="scanner-debug" style="font-size:10px;color:var(--lo);margin-top:4px;min-height:14px"></div>
</div>

<div id="lightbox" class="lightbox" onclick="cerrarImagen()">
  <img id="lb-img" src="" alt="Producto" onclick="event.stopPropagation()" />
  <div id="lb-name" class="lb-name"></div>
  <div class="lb-close">Toc&#xE1; afuera para cerrar</div>
</div>

<div id="cam-overlay">
  <div id="cam-wrap">
    <video id="cam-video" autoplay playsinline muted></video>
    <div id="cam-guide">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="198" height="198" rx="8" stroke="white" stroke-width="1.5" stroke-dasharray="6 4"/>
        <path d="M1 40 L1 1 L40 1" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
        <path d="M160 1 L199 1 L199 40" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
        <path d="M1 160 L1 199 L40 199" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
        <path d="M160 199 L199 199 L199 160" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
        <line x1="1" y1="100" x2="199" y2="100" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
      </svg>
    </div>
  </div>
  <div id="cam-hint">Apunt&#xE1; al c&#xF3;digo de barras</div>
  <div id="cam-result"></div>
  <button id="cam-torch" onclick="toggleTorch()">&#x1F526; Linterna</button>
  <button id="btn-close-cam" onclick="cerrarCamara()">&#x2715; Cerrar</button>
</div>

<button id="btn-cam" onclick="abrirCamara()" title="Escanear con c&#xE1;mara">&#x1F4F7;</button>

<div class="content" id="content">
  <div class="empty">
    <div class="empty-i">&#x1F4E6;</div>
    <div class="empty-t">Cargando&#x2026;</div>
  </div>
</div>

<button class="fab" id="fab" title="Actualizar">&#x1F504;</button>
<div id="toast"></div>

<!-- CAMBIOS AL movil.html — solo las funciones JS modificadas -->
<!-- Reemplazar el bloque <script> completo por este -->
<script>
const $ = id => document.getElementById(id);
let E = null, last = null;
let _guiaActual = null;
let _vozActiva  = true;

// ── CANAL ACTIVO ────────────────────────────────────────────────────────────
let _canalActivo = localStorage.getItem('canal_picking') || 'flex';
// Timestamp del último lote recibido — para detectar lotes nuevos
let _loteTimestamp = '';

function setCanal(canal, silencioso = false) {
  _canalActivo = canal;
  localStorage.setItem('canal_picking', canal);
  const btnF = $('btn-canal-flex');
  const btnC = $('btn-canal-colecta');

  // Estilos activo/inactivo para cada botón
  if (canal === 'flex') {
    if (btnF) { btnF.style.background='#7C3AED'; btnF.style.color='#fff';
                btnF.style.borderColor='#7C3AED'; }
    if (btnC) { btnC.style.background='var(--card)'; btnC.style.color='#2563EB';
                btnC.style.borderColor='#2563EB'; }
    $('t-sub').textContent = '⚡ Colecta FLEX';
  } else {
    if (btnC) { btnC.style.background='#2563EB'; btnC.style.color='#fff';
                btnC.style.borderColor='#2563EB'; }
    if (btnF) { btnF.style.background='var(--card)'; btnF.style.color='#7C3AED';
                btnF.style.borderColor='#7C3AED'; }
    $('t-sub').textContent = '🚚 Colecta COLECTA';
  }

  // Cuando el operario toca el botón manualmente, resetear timestamp
  // para que el siguiente loadQ detecte el lote del nuevo canal
  if (!silencioso) {
    _loteTimestamp = '';
    load();
  }
}

// ── AUTO-DETECCIÓN DE CANAL CON LOTE ACTIVO ────────────────────────────────
// Si el supervisor subió un lote en 'colecta' pero el celular tiene 'flex'
// guardado (o viceversa), el móvil lo detecta y cambia automáticamente.
async function detectarCanalActivo() {
  try {
    // Consultar ambos canales en paralelo
    const [rF, rC] = await Promise.all([
      fetch('/api/estado?canal=flex'),
      fetch('/api/estado?canal=colecta')
    ]);
    const dF = await rF.json();
    const dC = await rC.json();

    const flexCargado    = dF.cargado && (dF.grupos || []).length > 0;
    const colectaCargado = dC.cargado && (dC.grupos || []).length > 0;

    // Actualizar los botones de canal con SKUs disponibles en cada uno
    _actualizarBotonesCanal(
      flexCargado    ? (dF.total_skus || 0) : 0,
      colectaCargado ? (dC.total_skus || 0) : 0
    );

    // Caso 1: Solo flex tiene lote → cambiar automáticamente
    if (flexCargado && !colectaCargado) {
      if (_canalActivo !== 'flex') {
        setCanal('flex', true);
        toast('⚡ Canal FLEX detectado automáticamente', 'ok');
      }
      E = dF; _loteTimestamp = dF.ultima_actualizacion || ''; render(); return;
    }

    // Caso 2: Solo colecta tiene lote → cambiar automáticamente
    if (colectaCargado && !flexCargado) {
      if (_canalActivo !== 'colecta') {
        setCanal('colecta', true);
        toast('🚚 Canal COLECTA detectado automáticamente', 'ok');
      }
      E = dC; _loteTimestamp = dC.ultima_actualizacion || ''; render(); return;
    }

    // Caso 3: Ambas PCs tienen lote activo simultáneamente (caso normal de operación)
    // → Respetar el canal que el operario eligió (localStorage)
    // El operario ya eligió su canal con los botones FLEX / COLECTA
    const d = _canalActivo === 'flex' ? dF : dC;
    E = d; _loteTimestamp = d.ultima_actualizacion || ''; render(); return;

    // Caso 4: Ninguno tiene lote → mostrar pantalla de espera
  } catch(e) {
    console.error('[MOVIL] detectarCanalActivo error:', e);
    fb('err', '❌ Sin conexión al servidor');
  }
}

// Actualiza el texto de los botones de canal con cantidad de SKUs
function _actualizarBotonesCanal(skusFlex, skusColecta) {
  const btnF = document.getElementById('btn-canal-flex');
  const btnC = document.getElementById('btn-canal-colecta');
  if (btnF) {
    btnF.innerHTML = skusFlex > 0
      ? `⚡ FLEX<br><small style="font-weight:400;font-size:11px">${skusFlex} SKUs</small>`
      : '⚡ FLEX';
  }
  if (btnC) {
    btnC.innerHTML = skusColecta > 0
      ? `🚚 COLECTA<br><small style="font-weight:400;font-size:11px">${skusColecta} SKUs</small>`
      : '🚚 COLECTA';
  }
}

// ── CARGA ──────────────────────────────────────────────────────────────────
async function load() {
  try {
    const r = await fetch('/api/estado?canal=' + _canalActivo);
    if (!r.ok) { fb('err', '❌ Error del servidor: ' + r.status); return; }
    E = await r.json();
    console.log('[MOVIL] canal='+_canalActivo+' cargado='+E.cargado+' grupos='+((E.grupos||[]).length));

    // Si el canal actual NO tiene lote, buscar en el otro canal
    if (!E.cargado || !(E.grupos||[]).length) {
      console.log('[MOVIL] Canal sin lote — detectando canal activo...');
      await detectarCanalActivo();
      return;
    }

    render();
  } catch(e) {
    console.error('[MOVIL] load error:', e);
    fb('err', '❌ Sin conexión al servidor');
  }
}

// ── REFRESH SILENCIOSO (cada 5s) ────────────────────────────────────────────
// Solo sincroniza el canal propio del operario.
// Si ambas PCs tienen lote simultáneo, cada celular trabaja en su canal.
async function loadQ() {
  try {
    const r = await fetch('/api/estado?canal=' + _canalActivo);
    if (!r.ok) return;
    const nuevo = await r.json();

    // ── Caso A: Lote nuevo del supervisor (timestamp cambió) ─────────────────
    const tsNuevo = nuevo.ultima_actualizacion || '';
    if (tsNuevo && tsNuevo !== _loteTimestamp && nuevo.cargado && (nuevo.grupos||[]).length > 0) {
      if (_loteTimestamp) {
        // Había un lote antes → el supervisor cargó uno nuevo
        toast('🔄 Lote nuevo del supervisor', 'ok');
        leerProducto('El supervisor cargó un lote nuevo.');
      }
      _loteTimestamp = tsNuevo;
      E = nuevo;
      render();
      return;
    }

    // ── Caso B: Canal propio sin lote → buscar en otro canal ─────────────────
    // SOLO si el canal propio está vacío. Si ambos tienen lote, no cambiar.
    if (!nuevo.cargado || !(nuevo.grupos||[]).length) {
      const otroCanal = _canalActivo === 'flex' ? 'colecta' : 'flex';
      const r2 = await fetch('/api/estado?canal=' + otroCanal);
      const d2 = await r2.json();
      if (d2.cargado && (d2.grupos||[]).length > 0) {
        // Cambiar solo si el canal propio está vacío
        setCanal(otroCanal, true);
        E = d2;
        _loteTimestamp = d2.ultima_actualizacion || '';
        render();
        toast(`🔄 Lote detectado en canal ${otroCanal.toUpperCase()}`, 'ok');
        return;
      }
      // Ningún canal tiene lote → mantener pantalla de espera
      E = nuevo; render(); return;
    }

    // ── Caso C: Mismo lote, actualizar colecta ───────────────────────────────
    // Sincronizar escaneos del propio canal (otro celular escaneó algo)
    if (nuevo.cargado && E && E.cargado) {
      const colNueva = nuevo.colecta || {};
      const colVieja = E.colecta || {};
      const totNuevo = Object.values(colNueva).reduce((s, v) => s + Number(v), 0);
      const totViejo = Object.values(colVieja).reduce((s, v) => s + Number(v), 0);
      if (totNuevo !== totViejo) {
        E = nuevo; render(true);
      }
    }
  } catch(e) {
    // Silencioso — no mostrar error en refresh de fondo
  }
}

// ── IMAGEN DEL PRODUCTO ────────────────────────────────────────────────────
const _imgCache  = {};
const _imgPedida = new Set();

async function resolverImagen(sku) {
  sku = (sku || '').toUpperCase();
  if (!sku) return null;
  if (sku in _imgCache) { aplicarMiniatura(sku, _imgCache[sku]); return _imgCache[sku]; }
  if (_imgPedida.has(sku)) return null;
  _imgPedida.add(sku);
  try {
    const r = await fetch(`/api/imagen-sku/${sku}`);
    const d = await r.json();
    const url = (d.existe && d.imagen_url) ? d.imagen_url : null;
    _imgCache[sku] = url;
    aplicarMiniatura(sku, url);
    return url;
  } catch(e) { _imgCache[sku] = null; return null; }
}

function aplicarMiniatura(sku, url) {
  document.querySelectorAll(`.ithumb[data-sku="${sku}"]`).forEach(el => {
    if (url) {
      el.style.backgroundImage = `url("${url}")`;
      el.classList.add('has-img');
      el.textContent = '';
    } else {
      el.classList.remove('has-img');
      el.textContent = '📷';
    }
  });
}

function cargarMiniaturasVisibles() {
  document.querySelectorAll('.ithumb:not(.cargada)').forEach(el => {
    const sku = el.dataset.sku;
    if (!sku) return;
    el.classList.add('cargada');
    if (sku in _imgCache) aplicarMiniatura(sku, _imgCache[sku]);
    else resolverImagen(sku);
  });
}

async function abrirImagen(sku) {
  sku = (sku || '').toUpperCase();
  let url = _imgCache[sku];
  if (url === undefined) url = await resolverImagen(sku);
  if (!url) return;
  const lb = $('lightbox');
  $('lb-img').src = url;
  $('lb-name').textContent = sku;
  lb.style.display = 'flex';
}

function cerrarImagen() { $('lightbox').style.display = 'none'; }
async function cargarImagen(sku) { resolverImagen(sku); }

// ── VOZ ─────────────────────────────────────────────────────────────────────
function leerProducto(texto) {
  if (!_vozActiva || !texto || !window.speechSynthesis) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(texto);
    u.lang = 'es-UY'; u.rate = 0.95; u.pitch = 1.0;
    const voces = window.speechSynthesis.getVoices();
    const vEs = voces.find(v => v.lang && v.lang.toLowerCase().startsWith('es'));
    if (vEs) u.voice = vEs;
    window.speechSynthesis.speak(u);
  } catch(e) {}
}

if (window.speechSynthesis)
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

function repetirVoz() { if (_guiaActual) _anunciarItem(_guiaActual); }

function toggleVoz() {
  _vozActiva = !_vozActiva;
  const btn = $('btn-voz');
  if (_vozActiva) {
    btn.textContent = '🔊'; btn.style.color = 'var(--accent)';
    toast('🔊 Voz activada', 'ok');
    if (_guiaActual) _anunciarItem(_guiaActual);
  } else {
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    btn.textContent = '🔇'; btn.style.color = 'var(--mid)';
    toast('🔇 Voz desactivada', '');
  }
}

// ── GUÍA SECUENCIAL ─────────────────────────────────────────────────────────
function _proximoItem() {
  if (!E || !E.grupos) return null;
  const col = E.colecta || {};
  for (const g of E.grupos) {
    for (const it of (g.items || [])) {
      if ((col[it.sku] || 0) < it.req) return { ...it, pasillo: g.pasillo || 'Sin pasillo' };
    }
  }
  return null;
}

function _anunciarItem(it) {
  if (!it) return;
  const frase = `En el pasillo ${it.pasillo}, está ${it.nombre || 'el producto'}, `
              + `SKU ${_deletrear(it.sku)}.`
              + (it.req > 1 ? ` Llevá ${it.req} unidades.` : '');
  leerProducto(frase);
}

function _deletrear(sku) { return String(sku).split('').join(' '); }

function actualizarGuia(anunciar = false) {
  const it  = _proximoItem();
  const box = $('guia');
  if (!it) { if (box) box.style.display = 'none'; _guiaActual = null; return; }
  _guiaActual = it;
  if (box) box.style.display = 'block';
  $('guia-pasillo').textContent = '📍 ' + it.pasillo;
  $('guia-nombre').textContent  = it.nombre || '—';
  $('guia-sku').textContent     = 'SKU ' + it.sku;
  $('guia-estante').textContent = it.estanteria ? ('🗂 ' + it.estanteria) : '';
  $('guia-cant').textContent    = it.req > 1 ? ('× ' + it.req) : '';
  if (anunciar) _anunciarItem(it);
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function render(quiet = false) {
  try {
    if (!E) return;
    const gs  = E.grupos  || [];
    const col = E.colecta || {};
    const cargado = E.cargado === true || E.cargado === 'true' || E.cargado === 1;

    const content = document.getElementById('content');
    const badge   = document.getElementById('badge');
    const ban     = document.getElementById('ban');

    if (!cargado || !gs.length) {
      if (content) content.innerHTML = `<div class="empty">
        <div class="empty-i">📋</div>
        <div class="empty-t">Esperando lote del supervisor…<br>
        <small style="color:var(--lo)">Cuando el supervisor genere el lote<br>aparecerá aquí automáticamente.</small>
        </div></div>`;
      if (badge) { badge.textContent = '— / —'; badge.className = 'badge'; }
      $('t-sub').textContent = 'Esperando lote…';
      return;
    }

    // Guardar timestamp del lote actual
    if (E.ultima_actualizacion) _loteTimestamp = E.ultima_actualizacion;

    let tot = 0, done = 0, uds_done = 0, uds_tot = 0;
    gs.forEach(g => (g.items||[]).forEach(it => {
      const c = col[it.sku] || 0;
      tot++; uds_tot += it.req || 0;
      uds_done += Math.min(c, it.req || 0);
      if (c >= it.req) done++;
    }));

    if (badge) {
      badge.textContent = `${done} / ${tot}`;
      badge.className   = done === tot ? 'badge done' : (done > 0 ? 'badge warn' : 'badge');
    }
    $('t-sub').textContent = `${uds_done} / ${uds_tot} unidades`;
    if (ban) ban.className = E.colecta_completa ? 'show' : '';

    // Recordar grupos colapsados
    const colaps = new Set();
    document.querySelectorAll('.grupo').forEach(el => {
      if (el.querySelector('.g-items.col')) colaps.add(el.dataset.p);
    });

    if (content) content.innerHTML = gs.map(g => {
      const p   = g.pasillo || 'Sin pasillo';
      const its = g.items || [];
      const d   = its.filter(it => (col[it.sku] || 0) >= it.req).length;
      const cl  = colaps.has(p) ? 'col' : '';
      return `<div class="grupo" data-p="${p}">
        <div class="g-hdr" onclick="tog(this)">
          <div class="g-left">
            <span style="font-size:18px">📦</span>
            <div>
              <div class="g-name">${p}</div>
              <div class="g-stats">${its.length} SKU${its.length>1?'s':''} · ${its.reduce((s,i)=>s+(i.req||0),0)} ud.</div>
            </div>
          </div>
          <div class="g-prog ${d===its.length?'done':'pend'}">${d}/${its.length}</div>
        </div>
        <div class="g-items ${cl}">
          ${its.map(it => {
            const c  = col[it.sku] || 0;
            const ok = c >= it.req;
            return `<div class="item ${ok?'done':''}" id="item-${it.sku}">
              <div class="chk ${ok?'ok':'pend'}">${ok ? '✔' : '○'}</div>
              <div class="ithumb" data-sku="${it.sku}" onclick="event.stopPropagation();abrirImagen('${it.sku}')">📷</div>
              <div class="ibody">
                <span class="isku-badge">${it.sku}</span>
                <div class="iname">${it.nombre || '—'}</div>
                <div class="irow">
                  <span class="icnt ${ok?'ok':'pend'}">${c} / ${it.req}</span>
                  ${it.estanteria ? `<span class="iest">🗂 ${it.estanteria}</span>` : ''}
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');

    actualizarGuia(false);
    cargarMiniaturasVisibles();
  } catch(err) {
    console.error('[MOVIL] render error:', err);
  }
}

function tog(h) { h.nextElementSibling.classList.toggle('col'); }

// ── ESCANEO ─────────────────────────────────────────────────────────────────
async function scan(raw) {
  const sku = raw.trim().toUpperCase();
  if (!sku || sku.length < 2) return;
  if (last === sku) return;
  last = sku;
  setTimeout(() => last = null, 200);

  try {
    const r = await fetch('/api/escanear', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ sku, canal: _canalActivo })
    });
    const d = await r.json();

    if (!d.ok) {
      flash('err'); vib([200, 80, 200]);
      fb('err', `❌ ${d.msg}`);
    } else if (d.tipo === 'ya_completo') {
      vib([80]);
      fb('warn', `⚠ ${d.nombre || sku} — ya estaba completo`);
    } else {
      flash('ok'); vib([60]);
      const txt = d.tipo === 'completo'
        ? `✔  ${d.nombre || sku}  —  ¡Completo! (${d.req}/${d.req})`
        : `${d.nombre || sku}  ${d.collected}/${d.req}`;
      fb('ok', txt);

      if (!E.colecta) E.colecta = {};
      E.colecta[sku] = d.collected;

      if (d.todo_completo) {
        E.colecta_completa = true;
        toast('🎉 ¡Colecta completa!', 'ok');
        leerProducto('Terminamos, pasemos al packing.');
      }

      render(true);
      cargarImagen(sku);

      const el = document.getElementById(`item-${sku}`);
      if (el) {
        el.classList.add('recien');
        setTimeout(() => el.classList.remove('recien'), 700);
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      if (!d.todo_completo) setTimeout(() => actualizarGuia(true), 350);
    }
  } catch(e) {
    fb('err', '❌ Error de conexión');
  }
}

// ── HELPERS ─────────────────────────────────────────────────────────────────
function fb(t, m)  { const el=$('fb'); el.className=t; el.textContent=m; }

function toast(m, t='') {
  const el=$('toast'); el.textContent=m; el.className='show '+t;
  setTimeout(() => el.className='', 3000);
}

function flash(t) {
  const el=$('flash');
  el.className=t; el.style.opacity='1';
  setTimeout(() => { el.style.opacity='0'; setTimeout(()=>el.className='',300); },180);
}

function vib(p) { if (navigator.vibrate) navigator.vibrate(p); }

// ── CÁMARA ───────────────────────────────────────────────────────────────────
let _tecladoVisible = false;
let _camaraActiva   = false;
let _zxingReader    = null;
let _torchTrack     = null;
let _torchOn        = false;

async function abrirCamara() {
  const overlay = $('cam-overlay');
  overlay.classList.add('open');
  _camaraActiva = true;
  if (!window.ZXing) {
    $('cam-hint').textContent = 'Cargando escáner…';
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  try {
    const video  = $('cam-video');
    const hint   = $('cam-hint');
    const result = $('cam-result');
    const torch  = $('cam-torch');
    result.textContent=''; hint.textContent='Iniciando cámara…';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }
    });
    video.srcObject = stream;
    const [track] = stream.getVideoTracks();
    _torchTrack = track;
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if (caps.torch) torch.style.display = 'inline-block';
    hint.textContent = 'Apuntá el código de barras al recuadro azul';
    _zxingReader = new ZXing.BrowserMultiFormatReader();
    _zxingReader.decodeFromVideoElement(video, (res, err) => {
      if (!_camaraActiva) return;
      if (res) {
        const codigo = res.getText();
        $('cam-result').textContent = '✅ ' + codigo;
        if (navigator.vibrate) navigator.vibrate([60,30,60]);
        setTimeout(() => { cerrarCamara(); scan(codigo); }, 600);
      }
    });
  } catch(e) {
    $('cam-hint').textContent = e.name === 'NotAllowedError'
      ? '❌ Permiso de cámara denegado.'
      : '❌ No se pudo acceder a la cámara: ' + e.message;
  }
}

function cerrarCamara() {
  _camaraActiva = false;
  const video = $('cam-video');
  if (_zxingReader) { try { _zxingReader.reset(); } catch(e){} _zxingReader=null; }
  if (_torchTrack && _torchOn) {
    try { _torchTrack.applyConstraints({advanced:[{torch:false}]}); } catch(e){}
    _torchOn = false;
  }
  if (video.srcObject) { video.srcObject.getTracks().forEach(t=>t.stop()); video.srcObject=null; }
  $('cam-overlay').classList.remove('open');
  $('cam-result').textContent='';
  $('cam-torch').style.display='none';
  const inp=$('sku'); if (inp) setTimeout(()=>inp.focus(),100);
}

function toggleTorch() {
  if (!_torchTrack) return;
  _torchOn = !_torchOn;
  try {
    _torchTrack.applyConstraints({advanced:[{torch:_torchOn}]});
    $('cam-torch').textContent = _torchOn ? '🔦 Linterna ON' : '🔦 Linterna';
  } catch(e) {}
}

function confirmarManual() {
  const inp=$('sku'), v=inp.value.trim();
  if (v) { scan(v); inp.value=''; inp.focus(); }
  else   { inp.focus(); }
}

function toggleTeclado() {
  const inp=$('sku'), btn=$('btn-teclado');
  _tecladoVisible = !_tecladoVisible;
  if (_tecladoVisible) {
    inp.setAttribute('inputmode','text');
    inp.focus(); inp.click();
    if (btn) { btn.style.background='var(--accent)'; btn.style.color='#fff'; }
    $('fb').textContent='⌨ Escribí el SKU y tocá ✓'; $('fb').className='neu';
  } else {
    inp.setAttribute('inputmode','none');
    inp.value=''; inp.blur();
    setTimeout(()=>inp.focus(),80);
    if (btn) { btn.style.background='var(--panel)'; btn.style.color='var(--mid)'; }
    $('fb').textContent='🔫 Listo para escanear'; $('fb').className='neu';
  }
}

// ── INIT ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Inicializar visual del canal sin recargar (la carga la hace detectarCanalActivo)
  setCanal(_canalActivo, true);

  // Primera carga: detectar automáticamente en qué canal hay lote activo
  detectarCanalActivo();

  const inp      = $('sku');
  const debugDiv = $('scanner-debug');

  function debug(msg) {
    if (debugDiv) {
      debugDiv.textContent = msg;
      setTimeout(()=>{ if(debugDiv) debugDiv.textContent=''; }, 2000);
    }
  }

  // Desbloqueo de voz en primer toque
  let _vozDesbloqueada = false;
  function _desbloquearVoz() {
    if (_vozDesbloqueada || !window.speechSynthesis) return;
    _vozDesbloqueada = true;
    try { const u=new SpeechSynthesisUtterance(' '); u.volume=0; window.speechSynthesis.speak(u); } catch(e){}
    setTimeout(()=>actualizarGuia(true), 300);
  }
  document.addEventListener('touchstart', _desbloquearVoz, {once:true});
  document.addEventListener('click',      _desbloquearVoz, {once:true});

  // ── ESCÁNER LÁSER ──────────────────────────────────────────────────────────
  let _scanTimer = null;

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.keyCode === 13) {
      const v = inp.value.trim();
      if (v) { e.preventDefault(); clearTimeout(_scanTimer); debug(`✓ Enter: ${v}`); scan(v); inp.value=''; inp.focus(); }
    }
  });

  inp.addEventListener('input', () => {
    clearTimeout(_scanTimer);
    const v = inp.value.trim();
    if (!v || _tecladoVisible) return;
    _scanTimer = setTimeout(() => {
      const v2 = inp.value.trim();
      if (v2.length >= 2) { debug(`⏱️ Auto-scan: ${v2}`); scan(v2); inp.value=''; inp.focus(); }
    }, 80);
  });

  inp.addEventListener('blur', () => {
    if (!_tecladoVisible && !_camaraActiva) {
      const v = inp.value.trim();
      if (v.length >= 2) { clearTimeout(_scanTimer); debug(`👁️ Blur: ${v}`); scan(v); inp.value=''; setTimeout(()=>inp.focus(),80); }
    }
  });

  // Captura global para escáner físico
  let _gBuf='', _gLastKey=0, _gTimer=null;
  document.addEventListener('keydown', e => {
    if (_tecladoVisible || _camaraActiva) return;
    if (e.key==='Enter' || e.keyCode===13) {
      const s=_gBuf.trim(); _gBuf=''; clearTimeout(_gTimer);
      if (s.length>=2) { debug(`🌐 Enter global: ${s}`); scan(s); inp.focus(); }
      return;
    }
    if (e.key && e.key.length===1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
      const now=Date.now();
      if (now-_gLastKey>150) _gBuf='';
      _gLastKey=now; _gBuf+=e.key;
      clearTimeout(_gTimer);
      _gTimer=setTimeout(()=>{
        const s=_gBuf.trim(); _gBuf='';
        if (s.length>=2) { debug(`⏱️ Global: ${s}`); scan(s); inp.focus(); }
      }, 150);
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#btn-teclado') && !e.target.closest('#btn-confirmar') &&
        !e.target.closest('#btn-cam') && !e.target.closest('#cam-overlay') &&
        !e.target.closest('.g-hdr')) {
      if (!_tecladoVisible && !_camaraActiva) { inp.focus(); debug('🔫 Scanner activo'); }
    }
  });

  inp.focus();

  // Mantener foco cada 3s
  setInterval(() => {
    if (!_tecladoVisible && !_camaraActiva && document.activeElement !== inp) inp.focus();
  }, 3000);

  // Botón cámara: solo en táctiles
  const btnCam = $('btn-cam');
  if (btnCam) {
    const esMovil = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    btnCam.style.display = esMovil ? 'flex' : 'none';
  }

  // Botón refresh
  $('fab').addEventListener('click', () => {
    $('fab').classList.add('spin');
    // Al hacer refresh manual, siempre buscar el canal correcto
    detectarCanalActivo().finally(()=>setTimeout(()=>$('fab').classList.remove('spin'),500));
  });

  // Auto-refresh cada 5 segundos (silencioso)
  setInterval(loadQ, 5000);
});
</script>
